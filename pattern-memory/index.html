<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml"/>
  <title>Pattern Memory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      user-select: none;
    }

    a.back {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
    }
    a.back:hover { color: #e94560; }

    h1 { font-size: 2.2rem; color: #e94560; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 28px; }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 480px; }
    .screen.active { display: flex; }

    /* ── START ── */
    .mode-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mode-btn {
      background: #16213e;
      border: 2px solid #0f3460;
      color: #eee;
      border-radius: 10px;
      padding: 14px 20px;
      cursor: pointer;
      font-size: 0.95rem;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      min-width: 130px;
    }
    .mode-btn:hover, .mode-btn.selected { border-color: #e94560; background: #0f3460; }
    .mode-btn small { display: block; color: #888; font-size: 0.78rem; margin-top: 4px; }

    .start-btn {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 44px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .start-btn:hover { background: #c73652; }

    /* ── HUD ── */
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 14px;
      font-size: 1rem;
    }
    .hud span { color: #aaa; }
    .hud span b { color: #eee; }

    /* ── STATUS MESSAGE ── */
    .status {
      font-size: 1.05rem;
      color: #aaa;
      margin-bottom: 18px;
      min-height: 26px;
      text-align: center;
      transition: color 0.2s;
    }
    .status.watch { color: #f5a623; }
    .status.go    { color: #4caf50; }
    .status.wrong { color: #e94560; }

    /* ── GRID ── */
    .grid-wrap {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tile {
      border-radius: 12px;
      cursor: pointer;
      transition: filter 0.1s, transform 0.1s;
      border: 3px solid transparent;
    }
    .tile.dim   { filter: brightness(0.3); }
    .tile.lit   { filter: brightness(1.4); transform: scale(1.06); border-color: rgba(255,255,255,0.5); }
    .tile.press { filter: brightness(1.8); transform: scale(0.96); }
    .tile.locked { pointer-events: none; }

    /* Colors */
    .tile[data-c="0"] { background: #e94560; }
    .tile[data-c="1"] { background: #4caf50; }
    .tile[data-c="2"] { background: #2196f3; }
    .tile[data-c="3"] { background: #f5a623; }
    .tile[data-c="4"] { background: #9c27b0; }
    .tile[data-c="5"] { background: #00bcd4; }
    .tile[data-c="6"] { background: #ff5722; }
    .tile[data-c="7"] { background: #8bc34a; }
    .tile[data-c="8"] { background: #e91e63; }

    /* ── PROGRESS DOTS ── */
    .progress-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 18px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #0f3460;
      transition: background 0.2s;
    }
    .dot.done    { background: #4caf50; }
    .dot.current { background: #f5a623; }
    .dot.error   { background: #e94560; }

    /* ── RESULT ── */
    .result-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 16px;
      padding: 36px 40px;
      text-align: center;
      width: 100%;
      margin-bottom: 24px;
    }
    .result-box .big { font-size: 4rem; margin-bottom: 8px; }
    .result-box h2   { font-size: 1.6rem; margin-bottom: 16px; color: #e94560; }
    .result-box .stats { font-size: 1rem; color: #aaa; line-height: 1.9; }
    .result-box .stats b { color: #eee; }

    .btn-row { display: flex; gap: 12px; width: 100%; }
    .btn-row button {
      flex: 1;
      background: #16213e;
      border: 2px solid #0f3460;
      color: #eee;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-row button:hover { border-color: #e94560; }
    .btn-row button.primary { background: #e94560; border-color: #e94560; }
    .btn-row button.primary:hover { background: #c73652; }
  </style>
  <link rel="manifest" href="../manifest.json"/>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("../sw.js");</script>
</head>
<body>
  <a class="back" href="../index.html">← All Games</a>
  <h1>🧠 Pattern Memory</h1>
  <p class="subtitle">Watch the pattern — then repeat it!</p>

  <!-- START -->
  <div class="screen active" id="screen-start">
    <p style="color:#aaa; margin-bottom:14px;">Choose mode:</p>
    <div class="mode-grid">
      <button class="mode-btn selected" data-mode="classic">
        🟥 Classic
        <small>4 tiles · endless levels</small>
      </button>
      <button class="mode-btn" data-mode="hard">
        🔶 Hard
        <small>6 tiles · faster pace</small>
      </button>
      <button class="mode-btn" data-mode="chaos">
        🌀 Chaos
        <small>9 tiles · no mercy</small>
      </button>
    </div>
    <button class="start-btn" id="btn-start">Start Game</button>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="hud">
      <span>🎯 Level <b id="hud-level">1</b></span>
      <span>🏆 Best <b id="hud-best">0</b></span>
      <span>❤️ Lives <b id="hud-lives">3</b></span>
    </div>
    <div class="status watch" id="status-msg">Get ready…</div>
    <div class="progress-dots" id="progress-dots"></div>
    <div class="grid-wrap" id="tile-grid"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-box">
      <div class="big" id="result-emoji">💥</div>
      <h2 id="result-title">Game Over</h2>
      <div class="stats" id="result-stats"></div>
    </div>
    <div class="btn-row">
      <button class="primary" id="btn-again">▶ Play Again</button>
      <button id="btn-menu">🏠 Menu</button>
    </div>
  </div>

  <script>
    // ── CONFIG ──
    const MODES = {
      classic: { tiles: 4, cols: 2, tileSize: 130, showMs: 600, pauseMs: 200, lives: 3 },
      hard:    { tiles: 6, cols: 3, tileSize: 100, showMs: 500, pauseMs: 150, lives: 2 },
      chaos:   { tiles: 9, cols: 3, tileSize: 90,  showMs: 400, pauseMs: 100, lives: 1 },
    };

    // ── STATE ──
    let mode, cfg, level, lives, bestLevel;
    let sequence = [], playerIdx = 0;
    let locked = false;

    const $ = id => document.getElementById(id);

    // ── SCREENS ──
    function show(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $('screen-' + name).classList.add('active');
    }

    // ── MODE SELECT ──
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        mode = btn.dataset.mode;
      });
    });
    mode = 'classic';

    // ── START ──
    $('btn-start').addEventListener('click', startGame);

    function startGame() {
      cfg      = MODES[mode];
      level    = 1;
      lives    = cfg.lives;
      bestLevel = 0;
      sequence = [];
      show('game');
      buildGrid();
      nextLevel();
    }

    // ── BUILD GRID ──
    function buildGrid() {
      const grid = $('tile-grid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${cfg.cols}, ${cfg.tileSize}px)`;
      for (let i = 0; i < cfg.tiles; i++) {
        const t = document.createElement('div');
        t.className = 'tile dim locked';
        t.dataset.c = i;
        t.style.width  = cfg.tileSize + 'px';
        t.style.height = cfg.tileSize + 'px';
        t.addEventListener('click', () => onTileClick(i));
        grid.appendChild(t);
      }
    }

    function tiles() { return document.querySelectorAll('.tile'); }

    // ── NEXT LEVEL ──
    function nextLevel() {
      updateHud();
      sequence.push(Math.floor(Math.random() * cfg.tiles));
      buildDots();
      setStatus('👀 Watch!', 'watch');
      lockTiles(true);
      playSequence();
    }

    // ── PLAY SEQUENCE ──
    function playSequence() {
      let i = 0;
      function step() {
        if (i >= sequence.length) {
          setTimeout(enableInput, cfg.pauseMs * 2);
          return;
        }
        const idx = sequence[i];
        setTimeout(() => {
          flashTile(idx, cfg.showMs, () => {
            i++;
            setTimeout(step, cfg.pauseMs);
          });
        }, 0);
      }
      setTimeout(step, 600);
    }

    function flashTile(idx, dur, cb) {
      const t = tiles()[idx];
      t.classList.remove('dim');
      t.classList.add('lit');
      setTimeout(() => {
        t.classList.remove('lit');
        t.classList.add('dim');
        if (cb) cb();
      }, dur);
    }

    // ── INPUT ──
    function enableInput() {
      playerIdx = 0;
      lockTiles(false);
      setStatus('🟢 Your turn!', 'go');
    }

    function onTileClick(idx) {
      if (locked) return;
      playerIdx === 0 && buildDots(); // refresh dots

      const t = tiles()[idx];
      t.classList.add('press');
      setTimeout(() => t.classList.remove('press'), 150);

      if (idx === sequence[playerIdx]) {
        // correct
        markDot(playerIdx, 'done');
        playerIdx++;
        if (playerIdx === sequence.length) {
          // level complete!
          lockTiles(true);
          bestLevel = Math.max(bestLevel, level);
          setStatus('✅ Nice!', 'go');
          level++;
          setTimeout(nextLevel, 900);
        }
      } else {
        // wrong
        lockTiles(true);
        markDot(playerIdx, 'error');
        lives--;
        updateHud();
        if (lives <= 0) {
          setStatus('💥 Wrong!', 'wrong');
          setTimeout(endGame, 900);
        } else {
          setStatus(`❌ Wrong! ${lives} life${lives > 1 ? 'ves' : ''} left`, 'wrong');
          // replay same level
          setTimeout(() => {
            playerIdx = 0;
            buildDots();
            setStatus('👀 Watch again!', 'watch');
            playSequence();
          }, 1200);
        }
      }
    }

    // ── DOTS ──
    function buildDots() {
      const wrap = $('progress-dots');
      wrap.innerHTML = '';
      sequence.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i < playerIdx ? ' done' : i === playerIdx ? ' current' : '');
        wrap.appendChild(d);
      });
    }

    function markDot(idx, cls) {
      const dots = $('progress-dots').querySelectorAll('.dot');
      if (dots[idx]) { dots[idx].className = 'dot ' + cls; }
      // advance current marker
      if (cls === 'done' && dots[idx + 1]) dots[idx + 1].className = 'dot current';
    }

    // ── HELPERS ──
    function lockTiles(on) {
      locked = on;
      tiles().forEach(t => on ? t.classList.add('locked') : t.classList.remove('locked'));
    }

    function setStatus(msg, cls) {
      const el = $('status-msg');
      el.textContent = msg;
      el.className = 'status ' + cls;
    }

    function updateHud() {
      $('hud-level').textContent = level;
      $('hud-best').textContent  = bestLevel;
      $('hud-lives').textContent = lives;
    }

    // ── END ──
    function endGame() {
      show('result');
      const reached = level - 1;
      let emoji = '💥', title = 'Game Over';
      if (reached >= 15)     { emoji = '🏆'; title = 'Legendary!'; }
      else if (reached >= 10) { emoji = '🎉'; title = 'Impressive!'; }
      else if (reached >= 6)  { emoji = '👍'; title = 'Good run!'; }
      else if (reached >= 3)  { emoji = '😅'; title = 'Keep practicing!'; }

      $('result-emoji').textContent = emoji;
      $('result-title').textContent = title;
      $('result-stats').innerHTML   =
        `Reached level <b>${reached}</b><br>` +
        `Mode: <b>${mode.charAt(0).toUpperCase() + mode.slice(1)}</b><br>` +
        `Sequence length: <b>${sequence.length}</b>`;
    }

    $('btn-again').addEventListener('click', startGame);
    $('btn-menu').addEventListener('click', () => show('start'));
  </script>
</body>
</html>
