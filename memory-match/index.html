<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Match</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;user-select:none}
    a.back{position:fixed;top:16px;left:16px;color:#aaa;text-decoration:none;font-size:.9rem}
    a.back:hover{color:#e94560}
    h1{font-size:2.2rem;color:#e94560;margin-bottom:6px}
    .subtitle{color:#888;font-size:.9rem;margin-bottom:28px}
    .screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:500px}
    .screen.active{display:flex}

    /* START */
    .size-grid{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap;justify-content:center}
    .size-btn{background:#16213e;border:2px solid #0f3460;color:#eee;border-radius:10px;padding:14px 22px;cursor:pointer;font-size:.95rem;text-align:center;transition:border-color .2s,background .2s;min-width:110px}
    .size-btn:hover,.size-btn.selected{border-color:#e94560;background:#0f3460}
    .size-btn small{display:block;color:#888;font-size:.78rem;margin-top:4px}
    .start-btn{background:#e94560;color:#fff;border:none;border-radius:10px;padding:14px 44px;font-size:1.2rem;cursor:pointer;transition:background .2s}
    .start-btn:hover{background:#c73652}

    /* HUD */
    .hud{display:flex;justify-content:space-between;width:100%;margin-bottom:16px;font-size:1rem}
    .hud span{color:#aaa}.hud span b{color:#eee}

    /* BOARD */
    .board{display:grid;gap:10px;margin-bottom:20px;justify-content:center}

    .card{width:80px;height:80px;perspective:600px;cursor:pointer}
    .card.small{width:68px;height:68px}
    .card-inner{width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d;position:relative}
    .card.flipped .card-inner{transform:rotateY(180deg)}
    .card-face{position:absolute;width:100%;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
    .card-back{background:#16213e;border:2px solid #0f3460;font-size:1.8rem}
    .card-front{background:#0f3460;border:2px solid #1a5a9e;font-size:2rem;transform:rotateY(180deg)}
    .card.matched .card-front{background:#0d3b1e;border-color:#4caf50}
    .card.matched .card-inner{transform:rotateY(180deg)}

    /* RESULT */
    .result-box{background:#16213e;border:2px solid #0f3460;border-radius:16px;padding:36px 40px;text-align:center;width:100%;margin-bottom:24px}
    .result-box .big{font-size:4rem;margin-bottom:8px}
    .result-box h2{font-size:1.6rem;margin-bottom:16px;color:#e94560}
    .result-box .stats{font-size:1rem;color:#aaa;line-height:1.9}
    .result-box .stats b{color:#eee}
    .btn-row{display:flex;gap:12px;width:100%}
    .btn-row button{flex:1;background:#16213e;border:2px solid #0f3460;color:#eee;border-radius:10px;padding:12px;font-size:1rem;cursor:pointer;transition:border-color .2s}
    .btn-row button:hover{border-color:#e94560}
    .btn-row button.primary{background:#e94560;border-color:#e94560}
    .btn-row button.primary:hover{background:#c73652}
  </style>
  <link rel="manifest" href="../manifest.json"/>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("../sw.js");</script>
</head>
<body>
<a class="back" href="../index.html">← All Games</a>
<h1>🃏 Memory Match</h1>
<p class="subtitle">Find all the matching pairs!</p>

<!-- START -->
<div class="screen active" id="screen-start">
  <p style="color:#aaa;margin-bottom:14px">Choose grid size:</p>
  <div class="size-grid">
    <button class="size-btn selected" data-size="4">
      😊 Easy
      <small>4×3 · 6 pairs</small>
    </button>
    <button class="size-btn" data-size="6">
      🔥 Medium
      <small>4×4 · 8 pairs</small>
    </button>
    <button class="size-btn" data-size="8">
      💀 Hard
      <small>5×4 · 10 pairs</small>
    </button>
  </div>
  <button class="start-btn" id="btn-start">Start Game</button>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="hud">
    <span>🖱️ Moves: <b id="hud-moves">0</b></span>
    <span>✅ Pairs: <b id="hud-pairs">0</b>/<b id="hud-total">0</b></span>
    <span>⏱ <b id="hud-time">0</b>s</span>
  </div>
  <div class="board" id="board"></div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-box">
    <div class="big" id="result-emoji">🏆</div>
    <h2 id="result-title">All matched!</h2>
    <div class="stats" id="result-stats"></div>
  </div>
  <div class="btn-row">
    <button class="primary" id="btn-again">▶ Play Again</button>
    <button id="btn-menu">🏠 Menu</button>
  </div>
</div>

<script>
const EMOJIS = ['🐶','🐱','🐸','🦊','🐼','🦁','🐨','🐯','🐺','🦄','🐙','🦋','🌈','🍕','🍦','🎈','🚀','🌟','⚡','🎸'];

const SIZES = {
  4:  {pairs:6,  cols:4, rows:3},
  6:  {pairs:8,  cols:4, rows:4},
  8:  {pairs:10, cols:5, rows:4},
};

const $ = id => document.getElementById(id);
let size=4, cfg, moves=0, matchedPairs=0, flipped=[], locked=false;
let startTime, timerInterval;

document.querySelectorAll('.size-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    size=parseInt(btn.dataset.size);
  });
});

function show(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('screen-'+name).classList.add('active');
}

$('btn-start').addEventListener('click',startGame);
$('btn-again').addEventListener('click',startGame);
$('btn-menu').addEventListener('click',()=>{clearInterval(timerInterval);show('start');});

function startGame(){
  cfg=SIZES[size];
  moves=0; matchedPairs=0; flipped=[]; locked=false;
  $('hud-moves').textContent=0;
  $('hud-pairs').textContent=0;
  $('hud-total').textContent=cfg.pairs;
  $('hud-time').textContent=0;
  clearInterval(timerInterval);
  startTime=Date.now();
  timerInterval=setInterval(()=>{ $('hud-time').textContent=Math.floor((Date.now()-startTime)/1000); },500);

  const emojis=[...EMOJIS].sort(()=>Math.random()-.5).slice(0,cfg.pairs);
  const cards=[...emojis,...emojis].sort(()=>Math.random()-.5);

  const board=$('board');
  board.innerHTML='';
  board.style.gridTemplateColumns=`repeat(${cfg.cols}, ${size===8?'68px':'80px'})`;

  cards.forEach((em,i)=>{
    const card=document.createElement('div');
    card.className='card'+(size===8?' small':'');
    card.dataset.emoji=em;
    card.dataset.idx=i;
    card.innerHTML=`<div class="card-inner"><div class="card-face card-back">❓</div><div class="card-face card-front">${em}</div></div>`;
    card.addEventListener('click',()=>onCardClick(card));
    board.appendChild(card);
  });

  show('game');
}

function onCardClick(card){
  if(locked) return;
  if(card.classList.contains('flipped')||card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    moves++;
    $('hud-moves').textContent=moves;
    locked=true;
    const [a,b]=flipped;
    if(a.dataset.emoji===b.dataset.emoji){
      a.classList.add('matched');
      b.classList.add('matched');
      matchedPairs++;
      $('hud-pairs').textContent=matchedPairs;
      flipped=[];
      locked=false;
      if(matchedPairs===cfg.pairs) endGame();
    } else {
      setTimeout(()=>{
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped=[];
        locked=false;
      },900);
    }
  }
}

function endGame(){
  clearInterval(timerInterval);
  const secs=Math.floor((Date.now()-startTime)/1000);
  const rating=moves<=cfg.pairs+3?'🏆':moves<=cfg.pairs+8?'🎉':moves<=cfg.pairs+15?'👍':'😅';
  const title=moves<=cfg.pairs+3?'Amazing memory!':moves<=cfg.pairs+8?'Great job!':moves<=cfg.pairs+15?'Good effort!':'You did it!';
  setTimeout(()=>{
    $('result-emoji').textContent=rating;
    $('result-title').textContent=title;
    $('result-stats').innerHTML=`Finished in <b>${secs}s</b><br>Total moves: <b>${moves}</b><br>Pairs: <b>${cfg.pairs}</b>`;
    show('result');
  },600);
}
</script>
</body>
</html>
